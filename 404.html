<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    // Redirect /creative-research/obd-fuel → /creative-research/?offer=obd-fuel
    const base = '/creative-research/';
    const slug = window.location.pathname.replace(base, '').replace(/\/$/, '').replace(/\.html$/, '');
    if (slug && slug !== 'index') {
      window.location.replace(base + '?offer=' + encodeURIComponent(slug));
    } else {
      window.location.replace(base);
    }
  </script>
</head>
<body></body>
</html>
