<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting…</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // When GitHub serves this 404.html for an unknown path like /creative-research/obd-fuel,
    // we encode the full path + query into a ?p= param and redirect to the repo root index.html,
    // which then decodes it and restores the original URL via history.replaceState.
    (function() {
      var loc = window.location;
      var base = loc.pathname.split('/').slice(0, 2).join('/'); // e.g. /creative-research
      var rest = loc.pathname.slice(base.length) || '/';        // e.g. /obd-fuel
      var search = loc.search ? loc.search.slice(1) : '';
      var hash = loc.hash || '';
      var redirect = base + '/?p=' + encodeURIComponent(rest) +
        (search ? '&q=' + encodeURIComponent(search) : '') +
        hash;
      loc.replace(redirect);
    })();
  </script>
</head>
<body></body>
</html>
